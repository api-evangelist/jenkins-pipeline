aid: jenkins-pipeline
name: Jenkins Pipeline
description: >-
  Jenkins Pipeline is a suite of plugins that supports implementing and
  integrating continuous delivery pipelines into Jenkins. It provides an
  extensible set of tools for modeling simple-to-complex delivery pipelines
  as code via the Pipeline DSL (domain-specific language).
