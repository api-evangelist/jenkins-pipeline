aid: jenkins-pipeline
name: Jenkins Pipeline
description: >-
  Jenkins Pipeline is a suite of plugins for the Jenkins automation server that
  supports implementing and integrating continuous delivery pipelines as code.
  It provides an extensible domain-specific language (DSL) with two syntax
  styles - Declarative and Scripted - and core building blocks (agents, stages,
  steps) for modeling simple-to-complex CI/CD workflows that are versioned with
  application source code via a Jenkinsfile.
